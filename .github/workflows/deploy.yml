name: Deploy API Hub Infrastructure

on:
  push:
    branches:
      - main # This tells GitHub to run the pipeline every time you update the main branch

jobs:
  terraform:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Log into Google Cloud securely
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    # 3. Install Terraform on the GitHub server
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_wrapper: false

    # 4. Initialize Terraform
    - name: Terraform Init
      run: terraform init

    # 5. Apply the changes automatically!
    - name: Terraform Apply
      run: terraform apply -auto-approve
